<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>２乗小テスト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
      background-color: #f9f9f9;
    }

    #start-screen, #quiz-screen {
      max-width: 600px;
      margin: 0 auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    form label {
      display: block;
      margin: 15px 0;
      font-size: 18px;
      text-align: left;
    }

    form input, form select {
      font-size: 16px;
      padding: 5px;
      width: 100%;
      max-width: 300px;
      margin-top: 5px;
    }

    #question-text {
      font-size: 36px;
      margin-bottom: 20px;
    }

    #answer-input {
      font-size: 28px;
      width: 260px;
      height: 45px;
      margin: 15px auto;
      text-align: center;
      border: 2px solid #ccc;
      border-radius: 5px;
    }

    #keypad {
      margin: 20px auto;
      max-width: 280px;
    }

    #keypad button {
      width: 60px;
      height: 45px;
      margin: 4px;
      font-size: 18px;
      border: none;
      background-color: #e0e0e0;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #keypad button:hover {
      background-color: #d0d0d0;
    }

    .button-group {
      margin-top: 20px;
    }

    .button-group button {
      padding: 10px 25px;
      font-size: 18px;
      margin: 0 10px;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .button-group button:hover {
      background-color: #45a049;
    }

    #timer {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #d32f2f;
    }

    #quiz-screen {
      position: relative;
      display: none;
    }
  </style>
</head>
<body>

<div id="start-screen">
  <h2>２乗小テスト</h2>
  <form id="user-form">
    <label for="name">名前</label>
    <input type="text" id="name" required>

    <label for="grade">学年</label>
    <input type="text" id="grade" required>

    <label for="number">出席番号</label>
    <select id="number" required>
      <option value="">選択してください</option>
    </select>

    <div class="button-group">
      <button type="submit">開始</button>
    </div>
  </form>
</div>

<div id="quiz-screen">
  <div id="timer"></div>

  <div id="question-text"></div>

  <input type="text" id="answer-input" readonly>

  <div id="keypad">
    <button type="button" onclick="insertSymbol('1')">1</button>
    <button type="button" onclick="insertSymbol('2')">2</button>
    <button type="button" onclick="insertSymbol('3')">3</button>
    <button type="button" onclick="insertSymbol('4')">4</button>
    <button type="button" onclick="insertSymbol('5')">5</button>
    <button type="button" onclick="insertSymbol('6')">6</button>
    <button type="button" onclick="insertSymbol('7')">7</button>
    <button type="button" onclick="insertSymbol('8')">8</button>
    <button type="button" onclick="insertSymbol('9')">9</button>
    <button type="button" onclick="insertSymbol('0')">0</button>
    <button type="button" onclick="clearInput()">C</button>
    <button type="button" onclick="backspace()">←</button>
  </div>

  <div class="button-group">
    <button type="button" id="back-button">前へ</button>
    <button type="button" id="next-button">次へ</button>
  </div>
</div>

<script>
  // 問題データの生成
  const quizData = [];
  for (let i = 1; i <= 20; i++) {
    quizData.push({ question: `${i}^2`, answer: (i * i).toString() });
  }

  // 💡 GASのURL（ご自身のURLに置き換えてください）
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzaEbohb33NPS8iYg8YmCB46xcd99OwvjuV28EUXt9elnQ7DTzaFJkcmF8r0ez_BIXEZQ/exec';

  let currentQuestionIndex = 0;
  let answers = Array(quizData.length).fill("");
  let timerInterval;
  let remainingTime = 60 * 3; // 3分

  // 出席番号（1〜11）を動的に生成
  window.addEventListener('DOMContentLoaded', () => {
    const numberSelect = document.getElementById('number');
    if (numberSelect) {
      for (let i = 1; i <= 11; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        numberSelect.appendChild(opt);
      }
    }
  });

 // 開始処理（★原因を特定するデバッグ版に書き換え）
  document.getElementById('user-form').addEventListener('submit', function (e) {
    e.preventDefault();

    // 各要素がちゃんと存在するかチェック
    const nameEl = document.getElementById('name');
    const gradeEl = document.getElementById('grade');
    const classEl = document.getElementById('class');
    const numberEl = document.getElementById('number');

    // 見つからなかったIDを記録する配列
    let missingIds = [];
    if (!nameEl) missingIds.push('name (名前)');
    if (!gradeEl) missingIds.push('grade (学年)');
    if (!classEl) missingIds.push('class (クラス)');
    if (!numberEl) missingIds.push('number (出席番号)');

    // もし見つからないものがあれば、画面にアラートを出して処理を止める
    if (missingIds.length > 0) {
      alert("【原因発見】HTML内に以下の入力欄が見つかりません！\n" + missingIds.join('\n') + "\n\nコピペミスで消えていないか、ID名が間違っていないか確認してください。");
      return;
    }

    // すべて存在する場合のみ、値を取得して進む
    const name = nameEl.value.trim();
    const grade = gradeEl.value.trim();
    const className = classEl.value;
    const number = numberEl.value;

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.addEventListener("visibilitychange", handleVisibilityChange);
    startTimer();
    showQuestion();
  });

  // 問題表示
  function showQuestion() {
    const q = quizData[currentQuestionIndex];
    document.getElementById('question-text').innerHTML = `(${currentQuestionIndex + 1}/${quizData.length}) \\(${q.question.replace("^2", "^{2}")}\\) =`;
    document.getElementById('answer-input').value = answers[currentQuestionIndex] || '';
    document.getElementById('back-button').style.display = currentQuestionIndex > 0 ? 'inline-block' : 'none';
    
    const nextBtn = document.getElementById('next-button');
    if (currentQuestionIndex === quizData.length - 1) {
      nextBtn.textContent = "送信する";
      nextBtn.style.backgroundColor = "#d32f2f";
    } else {
      nextBtn.textContent = "次へ";
      nextBtn.style.backgroundColor = "#4CAF50";
    }

    if (window.MathJax) MathJax.typesetPromise();
  }

  // 「次へ」または「送信」ボタン
  document.getElementById('next-button').addEventListener('click', () => {
    const input = document.getElementById('answer-input').value.trim();
    answers[currentQuestionIndex] = input;

    if (currentQuestionIndex === quizData.length - 1) {
      confirmSubmit();
    } else {
      currentQuestionIndex++;
      showQuestion();
    }
  });

  // 「前へ」ボタン
  document.getElementById('back-button').addEventListener('click', () => {
    const input = document.getElementById('answer-input').value.trim();
    answers[currentQuestionIndex] = input;
    currentQuestionIndex--;
    showQuestion();
  });

  // Enterキーでの進行
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('next-button').click();
    }
  });

  function insertSymbol(sym) {
    const input = document.getElementById('answer-input');
    input.value += sym;
  }

  function backspace() {
    const input = document.getElementById('answer-input');
    input.value = input.value.slice(0, -1);
  }

  function clearInput() {
    document.getElementById('answer-input').value = '';
  }

  function handleVisibilityChange() {
    if (document.visibilityState === 'hidden') {
      alert("【警告】テスト画面から離れないでください。");
    }
  }

  function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      remainingTime--;
      updateTimerDisplay();
      if (remainingTime <= 0) {
        clearInterval(timerInterval);
        alert("制限時間になりました。自動的に解答を送信します。");
        submitAnswers();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const min = Math.floor(remainingTime / 60);
    const sec = remainingTime % 60;
    document.getElementById('timer').textContent = `残り時間: ${min}:${sec.toString().padStart(2, '0')}`;
  }

  function confirmSubmit() {
    const unansweredCount = answers.filter(a => a === "").length;
    let msg = "解答を送信しますか？";
    if (unansweredCount > 0) {
      msg = `未入力の問題が ${unansweredCount} 問あります。\n本当に送信しますか？`;
    }
    if (confirm(msg)) {
      submitAnswers();
    }
  }

  async function submitAnswers() {
    clearInterval(timerInterval);
    document.getElementById('next-button').disabled = true;
    document.getElementById('back-button').disabled = true;

    const name = encodeURIComponent(document.getElementById('name').value);
    const grade = encodeURIComponent(document.getElementById('grade').value);
    const className = encodeURIComponent(document.getElementById('class').value);
    const number = encodeURIComponent(document.getElementById('number').value);
    const answersStr = encodeURIComponent(answers.join(','));

    const score = quizData.reduce((acc, q, i) => acc + (answers[i] === q.answer ? 1 : 0), 0);

    const incorrect = quizData
      .map((q, i) => answers[i] !== q.answer ? `${q.question}=${answers[i] || "未入力"}（正:${q.answer}）` : null)
      .filter(Boolean)
      .join('; ');
    const reason = encodeURIComponent(incorrect);

    const url = `${GAS_URL}?name=${name}&grade=${grade}&className=${className}&number=${number}&answers=${answersStr}&score=${score}&reason=${reason}`;

    let success = false;
    for (let i = 0; i < 3; i++) {
      try {
        await fetch(url, { method: 'GET', mode: 'no-cors' });
        success = true;
        break;
      } catch (err) {
        console.warn(`送信リトライ ${i + 1} 回目失敗`);
        await new Promise(resolve => setTimeout(resolve, 1000));
      }
    }

    if (!success) {
      alert("送信に失敗しました。通信環境を確認してください。");
      return;
    }

    alert(`${quizData.length}問中${score}問正解でした。\n\n【間違い】\n${incorrect || "なし"}`);
    location.reload();
  }
</script>
</body>
</html>
